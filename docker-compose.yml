services:
  monday-motivation-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: monday_motivation_api
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
      - ./output:/app/output
    command: uvicorn api:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped
